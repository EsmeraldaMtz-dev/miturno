name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      appointment-service: ${{ steps.filter.outputs.appointment-service }}
      qr-service: ${{ steps.filter.outputs.qr-service }}
      notification-service: ${{ steps.filter.outputs.notification-service }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            appointment-service:
              - 'appointment-service/**'
            qr-service:
              - 'qr-service/**'
            notification-service:
              - 'notification-service/**'

  build-appointment-service:
    needs: changes
    if: ${{ needs.changes.outputs.appointment-service == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build appointment-service
        working-directory: appointment-service
        run: ./mvnw clean package -DskipTests

  build-qr-service:
    needs: changes
    if: ${{ needs.changes.outputs.qr-service == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build qr-service
        working-directory: qr-service
        run: ./mvnw clean package -DskipTests

  build-notification-service:
    needs: changes
    if: ${{ needs.changes.outputs.notification-service == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build notification-service
        working-directory: notification-service
        run: ./mvnw clean package -DskipTests