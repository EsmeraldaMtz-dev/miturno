name: Build and Test

on:
  push:
    branches: [ main ]
    paths:
      - 'appointment-service/**'
      - 'qr-service/**'
      - 'notification-service/**'
  pull_request:
    branches: [ main ]

jobs:
  build-appointment-service:
    runs-on: ubuntu-latest
    if: contains(github.event.commits[0].modified, 'appointment-service') || contains(github.event.commits[0].added, 'appointment-service')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build appointment-service
        working-directory: appointment-service
        run: ./mvnw clean package -DskipTests

  build-qr-service:
    runs-on: ubuntu-latest
    if: contains(github.event.commits[0].modified, 'qr-service') || contains(github.event.commits[0].added, 'qr-service')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build qr-service
        working-directory: qr-service
        run: ./mvnw clean package -DskipTests

  build-notification-service:
    runs-on: ubuntu-latest
    if: contains(github.event.commits[0].modified, 'notification-service') || contains(github.event.commits[0].added, 'notification-service')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build notification-service
        working-directory: notification-service
        run: ./mvnw clean package -DskipTests